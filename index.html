<!DOCTYPE html>
<html>
<head>
<title>SSS Flowers - Login</title>
<style>
body{font-family:Arial; background:#fff7f7;}
.login-box{width:350px;margin:auto;margin-top:120px;background:white;padding:30px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.3);text-align:center;}
input{padding:10px;margin:8px;width:80%;border-radius:5px;border:1px solid gray;}
.btn{background:#d6336c;color:white;border:none;padding:10px 15px;border-radius:5px;cursor:pointer;}
.btn:hover{background:#ff6b9a;}
</style>
</head>
<body>
<div class="login-box">
<h2>🌸 SSS Flowers Login</h2>
<input type="text" id="username" placeholder="Enter Username"><br>
<input type="password" id="password" placeholder="Enter Password"><br>
<button class="btn" onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>
<script>
function login(){
 let user=document.getElementById("username").value;
 let pass=document.getElementById("password").value;
 if(pass===user.substring(0,4)){
   window.location.href='home.html';
 }else{
   document.getElementById("loginMsg").innerText="Password Incorrect!";
 }
}
</script>
</body>
</html>
